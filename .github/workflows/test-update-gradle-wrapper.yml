---
name: Test Update Gradle Wrapper Action

on:
  workflow_dispatch:
  push:

jobs:
  test-update-gradle-wrapper:
    runs-on: ubuntu-latest
    name: Test update gradle wrapper action
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Display current Gradle wrapper versions
        run: |
          echo "Current Gradle wrapper versions:"
          for dir in test-gradle-project-*; do
            if [ -d "$dir" ] && \
               [ -f "$dir/gradle/wrapper/gradle-wrapper.properties" ]; then
              echo "=== $dir ==="
              cat "$dir/gradle/wrapper/gradle-wrapper.properties" | \
                grep distributionUrl
            fi
          done

      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.PREMEX_POT_APP_ID }}
          private-key: ${{ secrets.PREMEX_POT_APP_SECRET }}

      - name: Update Gradle wrappers
        uses: ./update-gradle-wrapper
        with:
          gradle-version: latest
          create-pr: true
          token: ${{ steps.generate-token.outputs.token }}
        id: update

      - name: Display results
        run: |
          echo "Update Results:"
          echo "  - Found: ${{ steps.update.outputs.found-count }} wrapper(s)"
          echo "  - Updated: \
            ${{ steps.update.outputs.updated-count }} wrapper(s)"

          # Display results with emojis
          echo ""
          echo "📋 Detailed Results:"

          # Process updated paths
          if [ -n "${{ steps.update.outputs.updated-paths }}" ]; then
            echo "✅ Successfully updated wrappers:"
            echo "${{ steps.update.outputs.updated-paths }}" | \
              while IFS= read -r path; do
                if [ -n "$path" ]; then
                  echo "  ✅ $path"
                fi
              done
          fi

          # Process failed paths
          if [ -n "${{ steps.update.outputs.failed-paths }}" ]; then
            echo "❌ Failed to update wrappers:"
            echo "${{ steps.update.outputs.failed-paths }}" | \
              while IFS= read -r path; do
                if [ -n "$path" ]; then
                  echo "  ❌ $path"
                fi
              done
          fi

      - name: Display updated Gradle wrapper versions
        run: |
          echo "Updated Gradle wrapper versions:"
          for dir in test-gradle-project-*; do
            if [ -d "$dir" ] && \
               [ -f "$dir/gradle/wrapper/gradle-wrapper.properties" ]; then
              echo "=== $dir ==="
              cat "$dir/gradle/wrapper/gradle-wrapper.properties" | \
                grep distributionUrl
            fi
          done

      - name: Verify wrappers work
        run: |
          echo "Testing that updated wrappers work:"
          for dir in test-gradle-project-*; do
            if [ -d "$dir" ] && [ -f "$dir/gradlew" ]; then
              echo "=== Testing $dir ==="
              cd "$dir"
              ./gradlew --version
              cd ..
            fi
          done
