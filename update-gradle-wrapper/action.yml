---
name: 'Update Gradle Wrapper'
description: >
  Recursively finds and updates Gradle wrappers to the latest version
author: 'premex-ab'

branding:
  icon: 'arrow-up-circle'
  color: 'green'

inputs:
  gradle-version:
    description: 'The Gradle version to update to (default: latest)'
    required: false
    default: 'latest'
  create-pr:
    description: 'Whether to create a Pull Request with the changes. If false, changes are left uncommitted for manual handling.'
    required: false
    default: 'false'
  token:
    description: 'GitHub Token to use for PR creation. Use a GitHub App token or PAT to trigger CI workflows.'
    required: false
    default: ${{ github.token }}

outputs:
  updated-count:
    description: 'Number of Gradle wrappers successfully updated'
    value: ${{ steps.update-wrapper.outputs.updated-count }}
  found-count:
    description: 'Number of Gradle wrappers found'
    value: ${{ steps.update-wrapper.outputs.found-count }}
  updated-paths:
    description: >
      Paths of Gradle wrappers that were successfully updated
      (newline-separated)
    value: ${{ steps.update-wrapper.outputs.updated-paths }}
  failed-paths:
    description: >
      Paths of Gradle wrappers that failed to update (newline-separated)
    value: ${{ steps.update-wrapper.outputs.failed-paths }}

runs:
  using: 'composite'
  steps:
    - name: Update Gradle Wrappers
      id: update-wrapper
      shell: bash
      run: |
        # Make the script executable
        chmod +x "${{ github.action_path }}/update-gradle-wrapper.sh"

        # Run the update script
        "${{ github.action_path }}/update-gradle-wrapper.sh" \
          "${{ inputs.gradle-version }}"

    - name: Create Pull Request
      if: inputs.create-pr == 'true' && steps.update-wrapper.outputs.updated-count != '0'
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.token }}
        commit-message: 'chore: bump Gradle Wrapper to ${{ inputs.gradle-version }}'
        committer: 'premex-bot <noreply@premex.se>'
        author: 'premex-bot <noreply@premex.se>'
        title: 'chore: bump Gradle Wrapper to ${{ inputs.gradle-version }}'
        body: |
          Bumps Gradle Wrapper to ${{ inputs.gradle-version }}.
          
          Updated ${{ steps.update-wrapper.outputs.updated-count }} Gradle wrapper(s) in this repository.
          
          ---
          
          <details>
          <summary>Automation details</summary>
          
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Triggered by: @${{ github.actor }}
          </details>
        branch: 'premex/gradle-wrapper-${{ inputs.gradle-version }}'
        delete-branch: true
        labels: 'dependencies,gradle'
